name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install system dependencies (sharp)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun x vitest run --reporter=verbose
        timeout-minutes: 5

      - name: Build dist
        run: bun run build:dist

      - name: Publish to npm
        run: |
          echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > .npmrc
          npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
