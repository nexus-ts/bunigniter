name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun x vitest run tests/ --exclude 'tests/smoke*'

      - name: Run smoke tests
        run: bun x vitest run tests/smoke.test.ts --reporter=verbose

      - name: Build check
        run: bun run --bun src/index.ts &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health
          kill %1 2>/dev/null || true

      - name: List routes
        run: bun run nx list
