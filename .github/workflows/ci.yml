name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create @nexusts/core symlink
        run: |
          mkdir -p node_modules/@nexusts
          ln -sf ../.. node_modules/@nexusts/core

      - name: Run unit tests
        run: bun x vitest run tests/ --exclude 'tests/smoke*' --reporter=verbose

      - name: Run smoke tests
        run: bun x vitest run tests/smoke.test.ts --reporter=verbose
