name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PORT: 15000
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install system dependencies (sharp)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create bunigniter package link for examples
        run: |
          ln -sf . node_modules/bunigniter/core
          ln -sf . node_modules/bunigniter

      - name: Run tests
        run: bun x vitest run --reporter=verbose
        timeout-minutes: 5
