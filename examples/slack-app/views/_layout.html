<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><?= title ?? 'Slack Clone' ?> — Bunigniter</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1d23; color: #d1d5db; min-height: 100vh; }
      a { color: #4da6ff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
      .header { background: #111318; border-bottom: 1px solid #2d2f36; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
      .header h1 { font-size: 18px; color: #fff; }
      .header .nav a { margin-left: 16px; color: #9ca3af; font-size: 14px; }
      .header .nav a:hover { color: #fff; }
      .btn { display: inline-block; padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; }
      .btn-primary { background: #4da6ff; color: #fff; }
      .btn-primary:hover { background: #3b8fd9; }
      .btn-danger { background: #ef4444; color: #fff; }
      .btn-sm { padding: 4px 12px; font-size: 12px; }
      input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #3d4049; border-radius: 6px; background: #22252b; color: #d1d5db; font-size: 14px; outline: none; }
      input:focus, textarea:focus { border-color: #4da6ff; }
      .card { background: #22252b; border: 1px solid #2d2f36; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
      .error { color: #ef4444; font-size: 14px; margin-bottom: 12px; padding: 8px 12px; background: rgba(239,68,68,0.1); border-radius: 6px; }
      .avatar { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: #3d4049; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
      .badge-online { background: #22c55e; color: #fff; }
      <?= slot_css ?? '' ?>
    </style>
  </head>
  <body>
    <div class="header">
      <h1><a href="/channels" style="color: #fff">⚡ SlackClone</a></h1>
      <div class="nav">
        <? if (user ?? false) { ?>
        <a href="/profile"><?= user.display_name ?? user.username ?></a>
        <a href="/logout">Sign out</a>
        <? } else { ?>
        <a href="/login">Sign in</a>
        <a href="/register">Register</a>
        <? } ?>
      </div>
    </div>
    <div class="container"><?= slot ?></div>
  </body>
</html>
