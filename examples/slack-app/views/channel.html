<!-- Channel CSS slot -->
<style>
  .sidebar {
    width: 260px;
    flex-shrink: 0;
  }
  .sidebar a {
    display: block;
    padding: 6px 10px;
    border-radius: 4px;
    color: #d1d5db;
    font-size: 14px;
  }
  .sidebar a:hover {
    background: #2d2f36;
    text-decoration: none;
  }
  .sidebar a.active {
    background: #4da6ff22;
    color: #4da6ff;
  }
  .msg {
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 4px;
  }
  .msg:hover {
    background: #2d2f36;
  }
  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    object-fit: cover;
    background: #3d4049;
  }
  .msg-input {
    display: flex;
    gap: 8px;
    padding: 8px 0;
  }
  .msg-input input {
    flex: 1;
  }
  #messages {
    height: calc(100vh - 260px);
    overflow-y: auto;
    margin-bottom: 8px;
  }
  .file-preview {
    max-width: 200px;
    max-height: 150px;
    border-radius: 6px;
    margin-top: 4px;
  }
</style>

<div style="display: flex; gap: 20px; margin-top: 20px">
  <!-- Sidebar -->
  <div class="card sidebar">
    <h3
      style="
        margin-bottom: 12px;
        font-size: 14px;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      "
    >
      Channels
    </h3>
    <? for (const ch of channels) { ?>
    <div style="margin-bottom: 2px">
      <a
        href="/channels/<?= ch.id ?>"
        class="<?= ch.id === channel.id ? 'active' : '' ?>"
        ># <?= ch.name ?></a
      >
    </div>
    <? } ?>
  </div>

  <!-- Messages -->
  <div class="card" style="flex: 1; display: flex; flex-direction: column">
    <h2 style="margin-bottom: 16px; font-size: 20px"># <?= channel.name ?></h2>
    <p style="font-size: 13px; color: #9ca3af; margin-bottom: 16px">
      <?= channel.topic ?? '' ?>
    </p>

    <div id="messages">
      <? for (const msg of messages) { ?>
      <div class="msg" style="display: flex; gap: 10px">
        <div>
          <? if (msg.avatar) { ?>
          <img src="/storage/<?= msg.avatar ?>" class="msg-avatar" alt="" />
          <? } else { ?>
          <div
            class="msg-avatar"
            style="
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 14px;
              color: #fff;
              background: #4da6ff;
            "
          >
            <?= (msg.display_name ?? msg.username)[0].toUpperCase() ?>
          </div>
          <? } ?>
        </div>
        <div style="flex: 1">
          <div style="font-size: 13px">
            <strong style="color: #fff"
              ><?= msg.display_name ?? msg.username ?></strong
            >
            <span style="color: #6b7280; margin-left: 8px; font-size: 11px"
              ><?= msg.created_at ?></span
            >
          </div>
          <? if (msg.content) { ?>
          <p style="margin-top: 4px; font-size: 14px"><?= msg.content ?></p>
          <? } ?>
          <? if (msg.file_path) { ?>
          <div style="margin-top: 4px">
            <? if (msg.file_type === 'image') { ?> <? const thumbPath =
            msg.file_path.replace(/(\.\w+)$/, '_thumb$1') ?>
            <a href="/storage/<?= msg.file_path ?>" target="_blank">
              <img
                src="/storage/<?= thumbPath ?>"
                class="file-preview"
                alt="attachment"
              />
            </a>
            <? } else { ?>
            <a
              href="/storage/<?= msg.file_path ?>"
              class="btn btn-sm btn-primary"
              >📎 Download file</a
            >
            <? } ?>
          </div>
          <? } ?>
        </div>
      </div>
      <? } ?>
    </div>

    <!-- Message input -->
    <form
      method="POST"
      action="/messages"
      enctype="multipart/form-data"
      class="msg-input"
      style="border-top: 1px solid #2d2f36; padding-top: 12px"
    >
      <input type="hidden" name="channel_id" value="<?= channel.id ?>" />
      <input
        type="text"
        name="content"
        placeholder="Message #<?= channel.name ?>"
        style="flex: 1"
      />
      <input type="file" name="attachment" style="width: auto; padding: 6px" />
      <button type="submit" class="btn btn-primary btn-sm">Send</button>
    </form>
  </div>
</div>
