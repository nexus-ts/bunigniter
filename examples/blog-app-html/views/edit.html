<h1><?= post ? 'Edit Post' : 'New Post' ?></h1>
<form action="<?= post ? '/admin/edit/'+post.id : '/admin/new' ?>" method="POST">
<div class="form-group"><label>Title</label><input type="text" name="title" value="<?= post?.title ?? '' ?>" required></div>
<div class="form-group"><label>Slug</label><input type="text" name="slug" value="<?= post?.slug ?? '' ?>" placeholder="url-friendly-name"></div>
<div class="form-group"><label>Excerpt</label><input type="text" name="excerpt" value="<?= post?.excerpt ?? '' ?>"></div>
<div class="form-group"><label>Content (Markdown)</label><textarea name="content" rows="12" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-family:monospace"><?= post?.content ?? '' ?></textarea></div>
<button class="btn btn-p">Save</button>
<a href="/admin" style="margin-left:12px;color:#888;font-size:13px">Cancel</a>
</form>
