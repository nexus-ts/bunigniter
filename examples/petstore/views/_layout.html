<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title><?= title ?? 'Pet Store' ?></title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fa;color:#333}
.topbar{background:#2d3436;color:#fff;padding:10px 0}
.inner{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:20px}
.topbar a{color:#fff;text-decoration:none;font-size:14px}
.topbar a:hover{color:#ff7675}
.logo{font-size:20px;font-weight:bold;color:#ff7675}
.nav{display:flex;gap:16px;flex:1}
.cart-badge{background:#ff7675;color:#fff;border-radius:10px;padding:2px 8px;font-size:12px}
.content{max-width:1100px;margin:0 auto;padding:20px}
.footer{text-align:center;padding:20px;color:#888;font-size:12px;border-top:1px solid #eee;margin-top:40px}
.btn{display:inline-block;padding:8px 20px;border-radius:6px;text-decoration:none;font-size:14px;border:none;cursor:pointer}
.btn-primary{background:#ff7675;color:#fff}
.btn-primary:hover{background:#e17055}
.btn-outline{background:transparent;border:1px solid #ff7675;color:#ff7675}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);overflow:hidden;transition:transform .2s}
.card:hover{transform:translateY(-2px)}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:14px}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-price{color:#ff7675;font-weight:bold;font-size:16px}
.card-species{font-size:12px;color:#888;margin-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.form-group input:focus,.form-group select:focus{border-color:#ff7675;outline:none}
.page-title{font-size:24px;margin-bottom:20px;color:#2d3436}
.flash{padding:12px;border-radius:6px;margin-bottom:16px;font-size:14px}
.flash-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.flash-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #eee}
th{background:#f8f9fa;color:#666;font-weight:600}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filters a{padding:6px 16px;border-radius:20px;border:1px solid #ddd;text-decoration:none;font-size:13px;color:#666}
.filters a:hover{border-color:#ff7675;color:#ff7675}
.filters a.active{background:#ff7675;color:#fff;border-color:#ff7675}
.detail{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:20px}
.detail img{width:100%;border-radius:8px;max-height:400px;object-fit:cover}
.detail h1{font-size:28px;margin-bottom:8px}
.detail .price{font-size:24px;color:#ff7675;font-weight:bold;margin-bottom:16px}
.detail .desc{line-height:1.6;color:#555;margin-bottom:16px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.badge-dog{background:#dfe6e9;color:#2d3436}
.badge-cat{background:#ffeaa7;color:#d68910}
.badge-bird{background:#81ecec;color:#00b894}
.badge-rabbit{background:#fab1a0;color:#c0392b}
</style>
</head>
<body>
<div class="topbar">
<div class="inner">
<a href="/" class="logo">🐾 Pet Store</a>
<div class="nav">
<a href="/">Home</a>
<a href="/pets">Pets</a>
<a href="/cart">Cart<? if (typeof cartCount !== 'undefined' && cartCount > 0) { ?> <span class="cart-badge"><?= cartCount ?></span><? } ?></a>
</div>
<? if (typeof user !== 'undefined' && user) { ?>
<span style="font-size:13px"><?= user.username ?> | <a href="/admin">Admin</a></span>
<? } ?>
</div>
</div>
<div class="content">
<? if (typeof flash !== 'undefined' && flash) { ?>
<div class="flash flash-<?= flashType ?? 'success' ?>"><?= flash ?></div>
<? } ?>
<?= slot ?>
</div>
<div class="footer">🐾 Pet Store — Built with Bunigniter + Rendu</div>
</body>
</html>
