<style>
.login-box { max-width: 320px; margin: 40px auto; }
.login-box h1 { font-size: 18px; margin-bottom: 16px; color: #ff6600; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 3px; }
.form-group input { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; }
.form-group input:focus { outline: none; border-color: #ff6600; }
.btn { background: #ff6600; color: #fff; border: none; padding: 7px 20px; border-radius: 3px; cursor: pointer; font-size: 13px; }
.btn:hover { opacity: 0.9; }
.hint { margin-top: 12px; font-size: 12px; color: #888; }
</style>

<div class="login-box">
  <h1>Login</h1>
  <form action="/login" method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required />
    </div>
    <button type="submit" class="btn">Login</button>
  </form>
  <div class="hint">Demo accounts: alice / bob / charlie (password: password123)</div>
</div>
