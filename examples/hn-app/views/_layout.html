<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><?= title ?? 'Hacker News' ?></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f6f6ef; color: #333; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { background: #ff6600; padding: 6px 12px; display: flex; align-items: center; gap: 12px; }
    .header .logo { font-weight: bold; color: #fff; font-size: 14px; text-decoration: none; border: 1px solid #fff; padding: 1px 5px; }
    .header a { color: #000; text-decoration: none; font-size: 13px; }
    .header a:hover { text-decoration: underline; }
    .header .nav { display: flex; gap: 10px; align-items: center; flex: 1; }
    .header .right { margin-left: auto; font-size: 12px; }
    .header .right a { color: #000; }
    .content { padding: 8px; }
    .footer { text-align: center; padding: 16px; color: #888; font-size: 11px; border-top: 2px solid #ff6600; margin-top: 16px; }
    .flash { background: #e8f5e9; border: 1px solid #c8e6c9; color: #2e7d32; padding: 8px 12px; margin-bottom: 8px; font-size: 13px; border-radius: 3px; }
    .flash-error { background: #ffebee; border-color: #ffcdd2; color: #c62828; }
    .pagination { margin-top: 12px; font-size: 13px; }
    .pagination a { color: #ff6600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/" class="logo">H</a>
      <div class="nav">
        <a href="/"><b>Hacker News</b></a>
        <a href="/new">new</a>
        <a href="/submit">submit</a>
      </div>
      <div class="right">
        <?js if (typeof user !== 'undefined' && user) { ?>
          <span><?= user.username ?></span> | <a href="/logout">logout</a>
        <?js } else { ?>
          <a href="/login">login</a>
        <?js } ?>
      </div>
    </div>

    <?js if (typeof flash !== 'undefined' && flash) { ?>
      <div class="flash <?= flashType ?? '' ?>"><?= flash ?></div>
    <?js } ?>

    <div class="content">
      <?= slot ?>
    </div>

    <div class="footer">NexusTS Hacker News Clone | Rendu Templates</div>
  </div>
</body>
</html>
