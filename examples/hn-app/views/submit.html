<style>
.submit-box { max-width: 500px; margin: 20px auto; }
.submit-box h1 { font-size: 18px; margin-bottom: 16px; color: #ff6600; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 3px; }
.form-group input, .form-group textarea { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; font-family: inherit; }
.form-group textarea { min-height: 100px; resize: vertical; }
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: #ff6600; }
.form-hint { font-size: 11px; color: #888; margin-top: 2px; }
.btn { background: #ff6600; color: #fff; border: none; padding: 7px 20px; border-radius: 3px; cursor: pointer; font-size: 13px; }
.btn:hover { opacity: 0.9; }
.or-divider { text-align: center; color: #888; font-size: 12px; margin: 4px 0; }
</style>

<div class="submit-box">
  <h1>Submit a Story</h1>
  <form action="/submit" method="POST">
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" placeholder="Story title" required />
    </div>
    <div class="form-group">
      <label>URL</label>
      <input type="url" name="url" placeholder="https://example.com" />
      <div class="form-hint">Optional — leave blank for text post</div>
    </div>
    <div class="or-divider">or</div>
    <div class="form-group">
      <label>Text</label>
      <textarea name="text" placeholder="Story text (optional if URL provided)"></textarea>
    </div>
    <button type="submit" class="btn">Submit</button>
  </form>
</div>
