<!-- Debug Toolbar — Bunigniter Developer Inspector -->
<!-- Rendu template: <?= expr ?>, <? code ?> -->

<div class="nexdb" id="__nexdb">
  <div class="bar" onclick="document.getElementById('__nexdb').classList.toggle('open')">
    <span class="logo">▣ Bunigniter</span>
    <span class="badge method"><?= method ?></span>
    <span class="path"><?= path ?></span>
    <span class="badge status"><b><?= status ?></b></span>
    <span class="badge time"><?= duration ?>ms</span>
    <span class="badge db">
      📊 <b><?= queries.length ?></b> <? if (queries.length === 1) { ?>query<? } else { ?>queries<? } ?>
      <? if (slowCount > 0) { ?><span class="warn">⚠️</span><? } ?>
    </span>
    <span class="badge mem">💾 <?= memory ?></span>
    <span class="badge date"><?= timestamp ?></span>
  </div>

  <div class="tabs">
    <span class="tab active" onclick="nexdbTab(this,'queries')">📊 SQL (<?= queries.length ?>)</span>
    <span class="tab" onclick="nexdbTab(this,'session')">🔒 Session (<?= sessionKeys ?>)</span>
    <span class="tab" onclick="nexdbTab(this,'info')">ℹ️ Info</span>
  </div>

  <!-- SQL Queries Panel -->
  <div class="panel" id="nexdb-queries">
    <? if (queries.length === 0) { ?>
      <div class="empty">No database queries in this request</div>
    <? } else { ?>
      <div class="query-stats">
        <span class="stat-item">Total: <b><?= queries.length ?></b></span>
        <span class="stat-item">Total time: <b><?= totalTime ?>ms</b></span>
        <? if (slowCount > 0) { ?>
          <span class="stat-item warn">Slow (>100ms): <b><?= slowCount ?></b></span>
        <? } ?>
      </div>
      <table>
        <tr><th>#</th><th>Duration</th><th>Rows</th><th>SQL</th></tr>
        <? for (const q of queries) { ?>
        <tr>
          <td class="num"><?= q.id ?></td>
          <td class="dur">
            <span class="dur-bar" style="width:<?= q.barWidth ?>px;background:<?= q.color ?>"></span>
            <span class="pill <?= q.pillClass ?>"><?= q.duration ?>ms</span>
          </td>
          <td class="num"><?= q.rows ?></td>
          <td>
            <code class="sql"><?= q.sqlEscaped ?></code>
            <? if (q.paramsEscaped) { ?>
              <div class="params">params: <?= q.paramsEscaped ?></div>
            <? } ?>
          </td>
        </tr>
        <? } ?>
      </table>
    <? } ?>
  </div>

  <!-- Session Panel -->
  <div class="panel" id="nexdb-session" style="display:none">
    <? if (sessionKeys === '0') { ?>
      <div class="empty">Session is empty</div>
    <? } else { ?>
      <table>
        <tr><th>Key</th><th>Value</th></tr>
        <? for (const [key, val] of Object.entries(session)) { ?>
        <tr><td class="key"><?= key ?></td><td class="val"><?= valEscaped(val) ?></td></tr>
        <? } ?>
      </table>
    <? } ?>
  </div>

  <!-- Info Panel -->
  <div class="panel" id="nexdb-info" style="display:none">
    <table>
      <tr><th>Property</th><th>Value</th></tr>
      <tr><td class="key">Method</td><td><?= method ?></td></tr>
      <tr><td class="key">Path</td><td><?= path ?></td></tr>
      <tr><td class="key">Status</td><td><?= status ?></td></tr>
      <tr><td class="key">Duration</td><td><?= duration ?>ms</td></tr>
      <tr><td class="key">Memory</td><td><?= memory ?></td></tr>
      <tr><td class="key">Timestamp</td><td><?= timestamp ?></td></tr>
      <tr><td class="key">Runtime</td><td><?= runtime ?></td></tr>
    </table>
  </div>
</div>

<style>
.nexdb{all:initial;font-family:system-ui,-apple-system,sans-serif;font-size:13px;color:#e0e0e0}
.nexdb *{all:unset;display:revert}
.nexdb{position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#13131f;border-top:2px solid #e94560;
  box-shadow:0 -4px 20px rgba(0,0,0,0.5);max-height:38px;overflow:hidden;transition:max-height 0.25s ease}
.nexdb.open{max-height:70vh;overflow-y:auto}
.nexdb .bar{display:flex;align-items:center;gap:6px;padding:8px 16px;cursor:pointer;user-select:none;
  background:linear-gradient(90deg,#1a1a2e,#16213e)}
.nexdb .bar:hover{background:linear-gradient(90deg,#1e1e35,#1a2745)}
.nexdb .logo{font-weight:700;color:#e94560;font-size:14px;margin-right:8px;flex-shrink:0}
.nexdb .path{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#aaa;font-size:12px}
.nexdb .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;
  font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.nexdb .badge.method{background:#e94560;color:#fff}
.nexdb .badge.status{background:#2d2d5e}
.nexdb .badge.db{background:rgba(123,237,159,0.15);color:#7bed9f}
.nexdb .badge.mem{background:rgba(112,161,255,0.15);color:#70a1ff}
.nexdb .badge.time{background:rgba(248,165,194,0.15);color:#f8a5c2}
.nexdb .badge.date{background:rgba(255,255,255,0.05);color:#666;font-size:10px}
.nexdb .warn{color:#f94860}
.nexdb .tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid #1e1e35;background:#0f0f1f;overflow-x:auto}
.nexdb .tab{padding:8px 16px;cursor:pointer;font-size:12px;color:#666;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap}
.nexdb .tab:hover{color:#ccc}
.nexdb .tab.active{color:#e94560;border-bottom-color:#e94560}
.nexdb .panel{padding:12px 16px;max-height:50vh;overflow-y:auto}
.nexdb table{width:100%;border-collapse:collapse;font-size:12px;margin:4px 0}
.nexdb th,.nexdb td{text-align:left;padding:6px 10px;border-bottom:1px solid #1e1e35;vertical-align:top}
.nexdb th{color:#e94560;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.nexdb .num{color:#666;width:30px;text-align:center}
.nexdb .dur{width:150px}
.nexdb .dur-bar{display:inline-block;height:4px;border-radius:2px;min-width:3px;vertical-align:middle;margin-right:6px}
.nexdb .pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.nexdb .pill-ok{background:rgba(123,237,159,0.15);color:#7bed9f}
.nexdb .pill-slow{background:rgba(249,72,96,0.2);color:#f94860}
.nexdb .sql{font-family:'SF Mono','Fira Code','Cascadia Code',monospace;color:#7bed9f;font-size:11px;word-break:break-all;display:block}
.nexdb .sql-warn{color:#f8a5c2}
.nexdb .params{color:#555;font-size:10px;margin-top:2px;font-family:monospace}
.nexdb .key{color:#70a1ff;width:160px}
.nexdb .val{color:#7bed9f;word-break:break-all}
.nexdb .empty{color:#555;font-style:italic;padding:16px;text-align:center;font-size:12px}
.nexdb .query-stats{display:flex;gap:20px;margin-bottom:8px;font-size:11px;color:#888}
.nexdb .query-stats b{color:#fff}
</style>
<script>
function nexdbTab(el,id){document.querySelectorAll('.nexdb .tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');document.querySelectorAll('.nexdb .panel').forEach(p=>p.style.display='none');
document.getElementById('nexdb-'+id).style.display='block'}
</script>
